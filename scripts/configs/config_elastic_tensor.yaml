seed_everything: 35
default_dtype: float32
restore_checkpoint: null # path to checkpoint to restore from; if `null`, train from scratch

data:
  # name and signature of the target property
  # The target should be given as a dictionary, {rank: T}, where rank is the rank of
  # the natural tensor, and T is the values of the natural tensor. The shape of T
  # should be (1, number, 3**rank), where `number` gives the number of tensors of the
  # corresponding rank.
  #
  #  NOTE, in the dataset file, the tensor should be given with the name
  #  `[target_name]_[target_mode]`, e.g. `elastic_tensor_natural`
  target_name: elastic_tensor
  target_mode: natural # options: `natural`, `full`, `voigt`
  target_signature: # {rank: number} of the natural tensor
    0: 2
    2: 2
    4: 1
  target_symmetry: ijkl=jikl=klij # this is only needed when target_mode is `full` or `voigt`
  trainset_filename: /Users/mjwen/Packages/carten_analysis/dataset/elastic_tensor/20250606/crystal_elasticity_filtered_n20.json
  valset_filename: /Users/mjwen/Packages/carten_analysis/dataset/elastic_tensor/20250606/crystal_elasticity_filtered_n20.json
  testset_filename: /Users/mjwen/Packages/carten_analysis/dataset/elastic_tensor/20250606/crystal_elasticity_filtered_n20.json
  r_cut: 5.0
  train_batch_size: 8
  val_batch_size: 8
  test_batch_size: 8

model:
  atomic_moment_mode: vanilla # architecture of atomic moment, `vanilla`,  `variant1` or `variant2`
  tp_path_mode: full # options: `full`, `lite`, `camp`

  F: 8 # number of channels
  num_layers: 2 # number of layers
  num_average_neigh: auto # average number of neighbors (float), if `auto` determined automatically from training set

  # angular
  max_L: 4 # max rank of natural tensor
  max_degree: null # max degree of coupling natural tensor, if `null`, equal to max_L

  # radial
  radial_mlp_hidden_layers: 2
  max_chebyshev_degree: 8 # max degree of Chebyshev polynomial for the radial part

  #
  layer_norm: true
  activation: silu
  last_layer_activation: true # has to be `false` if `activation` is `null`; if true, it is the same as `activation`
  residual: true

  # optional layers
  use_linear_channel_input: false
  use_linear_channel_hyper: false
  use_linear_channel_residual: true


  # output
  output_mlp_hidden_layers: 2 # number of hidden layers in the output MLP for scalars
  output_from_all_layers: false
  target_shift: auto # shift dict {rank: tensor}. `auto` to determine it automatically from training set; `null` to not use it
  target_scale: auto # scale dict {rank: tensor}. `auto` to determine it automatically from training set; `null` to not use it

loss:
  # ratio of the loss for each rank of natural tensor
  # The loss is: \sum w_i (y_i - \hat y_i)^2,
  # where y_i is the model prediction for natural tensor of rank i, and \hat y_i is corresponding target;
  # w_i is the weight for the loss of natural tensor of rank i.
  # If `normalize` is true, w_i = w_i/n_i, where n_i = 3**i is the number of elements in natural tensor of rank i.
  # The ranks should be consistent with the `target_signature` given in `data`.
  ratio:
    ## elastic tensor
    0: 1.0
    2: 1.0
    4: 1.0

  normalize: true # normalize natural tensor of different ranks by the number of elements

metrics:
  type: mae
  normalize: true # normalize natural tensor of different ranks by the number of elements
  validation_start_epoch: 0 # start calculating metrics at this epoch, can be used to avoid nan in the first few epochs

optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 0.01
    weight_decay: 0.01
    amsgrad: false

lr_scheduler:
  # TODO, use combination metric of all ranks
  monitor: val_ema/mae_rank-0
  class_path: torch.optim.lr_scheduler.ReduceLROnPlateau
  init_args:
    mode: min
    factor: 0.8
    patience: 100
    verbose: true
#lr_scheduler:
#  class_path: torch.optim.lr_scheduler.CosineAnnealingLR
#  init_args:
#    T_max: 5 # should be equal to trainer.max_epochs
#    eta_min: 0.0001

ema: # exponential moving average, https://github.com/lucidrains/ema-pytorch
  beta: 0.99
  update_after_step: 100
  update_every: 10
  power: 0.75
  include_online_model: false

trainer:
  max_epochs: 2
  accelerator: cpu
  num_nodes: 1
  check_val_every_n_epoch: 1
  log_every_n_steps: 50
  detect_anomaly: false
  inference_mode: true
  gradient_clip_val: 1.0
  gradient_clip_algorithm: value

  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      project: carten_proj

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelSummary
      init_args:
        max_depth: -1
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: null
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        # TODO, use combination metric of all ranks
        monitor: val_ema/mae_rank-0
        mode: min
        save_top_k: 3
        verbose: false
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        # TODO, use combination metric of all ranks
        monitor: val_ema/mae_rank-0
        mode: min
        patience: 200
        verbose: true
#    - class_path: lightning.pytorch.callbacks.StochasticWeightAveraging
#      init_args:
#        swa_lrs: 0.001
#        swa_epoch_start: 0.8

wandb_base_url: https://api.wandb-cn.top # https://api.bandw.top